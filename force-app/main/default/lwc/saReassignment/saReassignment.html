<template>
    <lightning-card title="Reassign Appointment" icon-name="standard:service_appointment">

        <!-- Loading -->
        <template lwc:if={isLoading}>
            <div class="slds-align_absolute-center slds-p-around_large">
                <lightning-spinner alternative-text="Loading" size="medium"></lightning-spinner>
            </div>
        </template>

        <!-- Error: no ServiceResource for logged-in user -->
        <template lwc:if={showNoResourceError}>
            <div class="slds-p-around_medium">
                <div class="slds-illustration slds-illustration_small">
                    <div class="slds-text-longform">
                        <p class="slds-text-body_regular slds-text-color_error">
                            Your user account is not linked to an active Service Resource. Contact your dispatcher.
                        </p>
                    </div>
                </div>
            </div>
        </template>

        <!-- Main content -->
        <template lwc:if={showContent}>
            <div class="slds-p-horizontal_medium slds-p-bottom_medium">

                <!-- Current Assignment -->
                <div class="slds-box slds-box_xx-small slds-m-bottom_medium current-assignment">
                    <div class="slds-grid slds-grid_vertical-align-center">
                        <div class="slds-col">
                            <p class="slds-text-title_caps slds-m-bottom_xx-small">Currently Assigned</p>
                            <p class="slds-text-heading_small">
                                <template lwc:if={context.currentResourceName}>
                                    <lightning-icon icon-name="standard:avatar" size="x-small" class="slds-m-right_x-small"></lightning-icon>
                                    {context.currentResourceName}
                                </template>
                                <template lwc:else>
                                    <span class="slds-text-color_weak">Unassigned</span>
                                </template>
                            </p>
                        </div>
                        <div class="slds-col_bump-left">
                            <lightning-badge label={crewStatusLabel} class={crewBadgeClass}></lightning-badge>
                        </div>
                    </div>
                </div>

                <!-- Non-Crew Warning -->
                <template lwc:if={showCrewWarning}>
                    <div class="slds-notify slds-notify_alert slds-alert_warning slds-m-bottom_medium" role="alert">
                        <lightning-icon icon-name="utility:warning" variant="warning" size="x-small" class="slds-m-right_x-small"></lightning-icon>
                        <span>{crewWarningMessage}</span>
                    </div>
                    <div class="slds-m-bottom_medium">
                        <lightning-input
                            type="checkbox"
                            label="I understand and want to proceed with individual reassignment"
                            checked={bypassWarning}
                            onchange={handleBypassChange}
                        ></lightning-input>
                    </div>
                </template>

                <!-- Non-Crew Info (no crew requirement) -->
                <template lwc:if={showNoCrewInfo}>
                    <div class="slds-box slds-box_xx-small slds-theme_info slds-m-bottom_medium">
                        <lightning-icon icon-name="utility:info" size="x-small" class="slds-m-right_x-small"></lightning-icon>
                        <span>No crew requirement detected for this appointment.</span>
                    </div>
                </template>

                <!-- Eligible Resources List -->
                <template lwc:if={showResourceList}>
                    <p class="slds-text-title_caps slds-m-bottom_x-small">
                        {resourceListLabel}
                    </p>

                    <template lwc:if={hasEligibleResources}>
                        <div class="resource-list">
                            <template for:each={context.eligibleResources} for:item="resource">
                                <div
                                    key={resource.resourceId}
                                    class={resource.cardClass}
                                    data-resource-id={resource.resourceId}
                                    onclick={handleResourceSelect}
                                    role="button"
                                    tabindex="0"
                                    onkeydown={handleResourceKeydown}
                                >
                                    <div class="slds-grid slds-grid_vertical-align-center">
                                        <lightning-icon
                                            icon-name="standard:avatar"
                                            size="small"
                                            class="slds-m-right_small"
                                        ></lightning-icon>
                                        <div class="slds-col">
                                            <p class="slds-text-heading_small">{resource.resourceName}</p>
                                            <template lwc:if={resource.isLeader}>
                                                <lightning-badge label="Crew Leader" class="slds-m-top_xx-small leader-badge"></lightning-badge>
                                            </template>
                                        </div>
                                        <template lwc:if={resource.isSelected}>
                                            <lightning-icon
                                                icon-name="utility:check"
                                                variant="success"
                                                size="small"
                                                class="slds-col_bump-left"
                                            ></lightning-icon>
                                        </template>
                                    </div>
                                </div>
                            </template>
                        </div>
                    </template>

                    <template lwc:else>
                        <div class="slds-align_absolute-center slds-p-around_medium">
                            <p class="slds-text-color_weak">No eligible resources found.</p>
                        </div>
                    </template>
                </template>
            </div>

            <!-- Footer: Reassign Button -->
            <div slot="footer">
                <lightning-button
                    label="Reassign"
                    variant="brand"
                    onclick={handleReassign}
                    disabled={isReassignDisabled}
                    class="slds-m-right_x-small"
                ></lightning-button>
            </div>
        </template>

        <!-- Success state -->
        <template lwc:if={showSuccess}>
            <div class="slds-align_absolute-center slds-p-around_large">
                <div class="slds-text-align_center">
                    <lightning-icon icon-name="action:approval" size="large" class="slds-m-bottom_small"></lightning-icon>
                    <p class="slds-text-heading_small slds-m-top_small">
                        Appointment reassigned to {selectedResourceName}
                    </p>
                </div>
            </div>
        </template>

    </lightning-card>
</template>
